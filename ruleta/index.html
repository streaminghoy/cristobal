<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamWheel V5 (Stable Core)</title>
    
    <!-- LIBRERÍAS (Modo Seguro) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/mqtt@4.3.7/dist/mqtt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        
        /* BASE */
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; font-family: 'Montserrat', sans-serif; background-color: transparent; }
        
        /* MODOS */
        body.dashboard-mode { background-color: #0f172a !important; color: white; overflow-y: auto !important; }
        body.overlay-mode { background-color: transparent !important; }

        /* OVERLAY ELEMENTS */
        #overlay-root {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        /* WHEEL */
        .wheel-container { 
            position: relative; width: 700px; height: 700px;
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.6));
            transition: transform 0.5s;
        }
        .pointer {
            position: absolute; top: -25px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; 
            border-left: 25px solid transparent; border-right: 25px solid transparent; border-top: 50px solid white;
            z-index: 10; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }
        
        /* ROLLER */
        .roller-container {
            position: relative; width: 800px; height: 300px;
            background: #1e293b; border: 6px solid #3b82f6; border-radius: 20px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.9); overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        .roller-window {
            height: 100px; overflow: hidden; width: 100%; position: relative;
            mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent);
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent);
        }
        .roller-list { text-align: center; font-size: 3.5rem; font-weight: 900; color: white; text-transform: uppercase; line-height: 100px; }
        .roller-highlight {
            position: absolute; top: 50%; left: 0; width: 100%; height: 110px; transform: translateY(-50%);
            border-top: 4px solid #facc15; border-bottom: 4px solid #facc15;
            background: rgba(250, 204, 21, 0.05); pointer-events: none; z-index: 10;
        }

        /* TEXTOS */
        .wheel-title {
            font-size: 3.5rem; font-weight: 900; text-transform: uppercase; color: white;
            text-shadow: 0 5px 15px rgba(0,0,0,0.5); background: rgba(0,0,0,0.6); padding: 10px 40px; border-radius: 15px; margin-bottom: 40px;
        }
        .winner-modal {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            background: white; color: #0f172a; padding: 50px 80px; border-radius: 30px;
            text-align: center; box-shadow: 0 0 100px rgba(0,0,0,0.8); z-index: 20;
            border: 8px solid #facc15; opacity: 0; transition: 0.5s; pointer-events: none; min-width: 500px;
        }
        .winner-modal.show { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        .winner-text { font-size: 4rem; font-weight: 900; line-height: 1; margin-top: 15px; color: #2563eb; }

        /* DASHBOARD */
        .glass-panel { background: rgba(30, 41, 59, 0.95); border: 1px solid rgba(255,255,255,0.1); padding: 25px; border-radius: 16px; margin: 30px auto; max-width: 600px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        input, textarea { width: 100%; background: #1e293b; border: 1px solid #475569; color: white; padding: 12px; border-radius: 8px; outline: none; margin-bottom: 15px; font-size: 1rem; }
        input:focus, textarea:focus { border-color: #3b82f6; }
        .btn { width: 100%; padding: 15px; border-radius: 8px; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.2s; border: none; font-size: 1.1rem; }
        .btn-spin { background: #facc15; color: black; box-shadow: 0 4px 0 #b45309; }
        .btn-spin:active { transform: translateY(4px); box-shadow: 0 0 0 #b45309; }
        .btn-spin:disabled { background: #475569; color: #94a3b8; box-shadow: none; cursor: not-allowed; }
        .btn-reset { background: #334155; color: white; margin-top: 15px; font-size: 0.9rem; }
        .btn-force { background: #ef4444; color: white; margin-top: 10px; font-size: 0.8rem; padding: 10px; }
        .btn-copy { background: #3b82f6; color: white; padding: 8px 15px; border-radius: 6px; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const MQTT_CONFIG = { host: 'broker.emqx.io', port: 8084, path: '/mqtt' };
        
        // Generador ID Sesión (Persistente para evitar desconexiones al recargar)
        const getSessionId = () => {
            const p = new URLSearchParams(window.location.search);
            if(p.get('id')) return p.get('id');
            let id = localStorage.getItem('sw_v5_id');
            if(!id) { id = 'wheel_' + Math.floor(Math.random() * 100000); localStorage.setItem('sw_v5_id', id); }
            return id;
        };
        const SESSION_ID = getSessionId();

        const COLORS = ['#ef4444', '#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#06b6d4', '#f97316'];

        // --- HOOK DE CONEXIÓN ---
        const useWheelEngine = (mode) => {
            const [data, setData] = useState({
                names: ["Participante 1", "Participante 2"],
                title: "SORTEO EN VIVO",
                style: "roller",
                isSpinning: false,
                winner: null,
                targetIndex: 0
            });
            const [status, setStatus] = useState('Offline');
            const client = useRef(null);

            useEffect(() => {
                const c = mqtt.connect(`wss://${MQTT_CONFIG.host}:${MQTT_CONFIG.port}${MQTT_CONFIG.path}`, { 
                    clientId: `cli_${mode}_${Math.random().toString(16).substr(2, 6)}` 
                });

                c.on('connect', () => {
                    setStatus('Online');
                    // Suscribirse a todo lo relacionado con esta sesión
                    c.subscribe(`sc_wheel_v5/${SESSION_ID}/#`);
                });

                c.on('message', (topic, msg) => {
                    try {
                        const payload = JSON.parse(msg.toString());
                        if (topic.includes('/update')) {
                            setData(prev => ({ ...prev, ...payload }));
                        }
                    } catch(e) {}
                });

                client.current = c;
                return () => c.end();
            }, [mode]);

            const update = (newData) => {
                // Actualizar local
                setData(prev => ({ ...prev, ...newData }));
                // Enviar remoto
                if (client.current?.connected) {
                    client.current.publish(`sc_wheel_v5/${SESSION_ID}/update`, JSON.stringify(newData), { retain: true });
                }
            };

            return { data, update, status };
        };

        // --- COMPONENTES VISUALES ---

        const WheelCanvas = ({ names, spinning, targetIndex, onFinish }) => {
            const canvasRef = useRef(null);
            const rotation = useRef(0);
            const anim = useRef(null);

            const draw = (rot) => {
                const cvs = canvasRef.current;
                if(!cvs) return;
                const ctx = cvs.getContext('2d');
                const cx = 350, cy = 350, r = 330;
                const arc = (2 * Math.PI) / names.length;

                ctx.clearRect(0,0,700,700);
                
                // Fondo
                ctx.beginPath(); ctx.arc(cx, cy, r+10, 0, 2*Math.PI); ctx.fillStyle="white"; ctx.fill();
                
                ctx.save();
                ctx.translate(cx, cy);
                ctx.rotate(rot);

                names.forEach((n, i) => {
                    const a = i * arc;
                    ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0,r,a,a+arc);
                    ctx.fillStyle = COLORS[i % COLORS.length]; ctx.fill(); ctx.stroke();
                    
                    ctx.save();
                    ctx.rotate(a + arc/2);
                    ctx.textAlign = "right"; ctx.fillStyle = "white"; ctx.font = "bold 24px Arial";
                    ctx.fillText(n.substring(0,18), r-20, 10);
                    ctx.restore();
                });
                ctx.restore();
                
                // Centro
                ctx.beginPath(); ctx.arc(cx, cy, 60, 0, 2*Math.PI); ctx.fillStyle="white"; ctx.fill();
                ctx.beginPath(); ctx.arc(cx, cy, 50, 0, 2*Math.PI); ctx.fillStyle="#1e293b"; ctx.fill();
                ctx.fillStyle="#facc15"; ctx.font="40px Arial"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText("★", cx, cy+2);
            };

            useEffect(() => {
                if(spinning) {
                    let start = null;
                    const dur = 6000;
                    const startRot = rotation.current;
                    const arc = (2*Math.PI)/names.length;
                    const targetAngle = (targetIndex * arc) + (arc/2);
                    const stopAngle = (3 * Math.PI / 2) - targetAngle;
                    const finalRot = startRot + (10 * 2 * Math.PI) + (stopAngle - (startRot % (2 * Math.PI)));

                    const loop = (ts) => {
                        if(!start) start = ts;
                        const p = Math.min((ts - start) / dur, 1);
                        const ease = 1 - Math.pow(1 - p, 4);
                        rotation.current = startRot + (finalRot - startRot) * ease;
                        draw(rotation.current);
                        if(p < 1) anim.current = requestAnimationFrame(loop);
                        else onFinish();
                    };
                    anim.current = requestAnimationFrame(loop);
                } else {
                    draw(rotation.current);
                }
                return () => cancelAnimationFrame(anim.current);
            }, [spinning, names, targetIndex]);

            // Redibujar si cambia la lista y no está girando
            useEffect(() => { if(!spinning) draw(rotation.current); }, [names]);

            return <canvas ref={canvasRef} width={700} height={700} className="w-full h-full" />;
        };

        const Roller = ({ names, spinning, targetIndex, onFinish }) => {
            const listRef = useRef(null);
            const displayList = [...names, ...names, ...names, ...names, ...names, ...names]; 
            const h = 100;

            useEffect(() => {
                const el = listRef.current;
                if(!el) return;
                
                if(spinning) {
                    el.style.transition = 'none';
                    el.style.transform = 'translateY(0)';
                    void el.offsetWidth; // Force reflow
                    
                    const finalPos = (3 * names.length + targetIndex) * h;
                    
                    setTimeout(() => {
                        el.style.transition = 'transform 5s cubic-bezier(0.1, 0.8, 0.1, 1)';
                        el.style.transform = `translateY(-${finalPos}px)`;
                    }, 50);

                    const t = setTimeout(onFinish, 5500);
                    return () => clearTimeout(t);
                } else {
                    // Reset visual si no gira
                    el.style.transition = 'none';
                    el.style.transform = 'translateY(0)';
                }
            }, [spinning, names, targetIndex]);

            return (
                <div className="roller-container">
                    <div className="roller-highlight"></div>
                    <div className="roller-window">
                        <div ref={listRef} className="roller-list">
                            {displayList.map((n, i) => <div key={i} style={{height: h+'px', display:'flex', alignItems:'center', justifyContent:'center'}}>{n}</div>)}
                        </div>
                    </div>
                </div>
            );
        };

        // --- OVERLAY ---
        const Overlay = ({ data, update }) => {
            const finishSpin = () => {
                try { confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 }, zIndex: 1000 }); } catch(e){}
                // IMPORTANTE: Avisar al dashboard que terminó
                update({ isSpinning: false, winner: data.names[data.targetIndex] });
            };

            return (
                <div id="overlay-root">
                    {data.title && <div className="wheel-title">{data.title}</div>}
                    
                    {data.style === 'wheel' ? 
                        <div className="wheel-container"><div className="pointer"></div><WheelCanvas names={data.names} spinning={data.isSpinning} targetIndex={data.targetIndex} onFinish={finishSpin}/></div> :
                        <Roller names={data.names} spinning={data.isSpinning} targetIndex={data.targetIndex} onFinish={finishSpin}/>
                    }

                    <div className={`winner-modal ${data.winner ? 'show' : ''}`}>
                        <div className="text-gray-500 font-bold uppercase tracking-widest text-xl">GANADOR</div>
                        <div className="winner-text">{data.winner}</div>
                    </div>
                </div>
            );
        };

        // --- DASHBOARD ---
        const Dashboard = ({ data, update, status }) => {
            const obsUrl = `${window.location.href.split('?')[0]}?mode=overlay&id=${SESSION_ID}`;
            const [localText, setLocalText] = useState("");

            useEffect(() => {
                if(data.names.length > 0 && localText === "") setLocalText(data.names.join('\n'));
            }, [data.names]);

            const handleText = (e) => {
                setLocalText(e.target.value);
                const arr = e.target.value.split('\n').filter(n => n.trim() !== '');
                if(arr.length > 0) update({ names: arr });
            };

            const spin = () => {
                if(data.names.length < 2) return alert("Faltan participantes");
                const idx = Math.floor(Math.random() * data.names.length);
                update({ isSpinning: true, winner: null, targetIndex: idx });
            };

            const forceStop = () => update({ isSpinning: false, winner: null });

            return (
                <div className="p-4">
                    <div className="glass-panel text-center">
                        <h1 className="text-3xl font-black mb-1">STREAM<span className="text-yellow-400">WHEEL</span> V5</h1>
                        <p className="text-xs text-gray-400 mb-6 font-bold tracking-widest">{status.toUpperCase()}</p>

                        <div className="flex gap-2 mb-4 bg-slate-900 p-2 rounded-lg">
                            <button className={`flex-1 py-2 rounded text-xs font-bold ${data.style==='wheel'?'bg-blue-600':'bg-slate-700'}`} onClick={()=>update({style:'wheel'})}>🎡 RULETA</button>
                            <button className={`flex-1 py-2 rounded text-xs font-bold ${data.style==='roller'?'bg-blue-600':'bg-slate-700'}`} onClick={()=>update({style:'roller'})}>🎰 RODILLO</button>
                        </div>

                        <label className="text-xs font-bold text-gray-500 block text-left mb-1">TÍTULO</label>
                        <input value={data.title} onChange={e => update({ title: e.target.value })} />

                        <label className="text-xs font-bold text-gray-500 block text-left mb-1">PARTICIPANTES ({data.names.length})</label>
                        <textarea rows="6" value={localText} onChange={handleText} placeholder="Nombres..."></textarea>

                        <button className="btn btn-spin" onClick={spin} disabled={data.isSpinning}>
                            {data.isSpinning ? 'GIRANDO...' : '¡GIRAR!'}
                        </button>
                        
                        {data.winner && <div className="mt-4 p-4 bg-green-900 rounded-lg border border-green-500">
                            <div className="text-green-300 text-xs font-bold uppercase">Ganador:</div>
                            <div className="text-green-100 text-2xl font-black">{data.winner}</div>
                        </div>}

                        <button className="btn btn-reset" onClick={() => update({ winner: null, isSpinning: false })}>REINICIAR</button>
                        {data.isSpinning && <button className="btn btn-force" onClick={forceStop}>⚠️ FORZAR PARADA</button>}

                        <div className="mt-8 pt-4 border-t border-gray-700 flex gap-2 items-center justify-between">
                            <span className="text-xs text-gray-500 font-bold">URL OBS/VMIX:</span>
                            <button className="btn-copy" onClick={() => navigator.clipboard.writeText(obsUrl)}>COPIAR URL</button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- APP ROOT ---
        const App = () => {
            const [mode, setMode] = useState(null);
            // Instanciar motores separados para evitar conflictos de estado
            const dashEngine = useWheelEngine('dashboard');
            const ovEngine = useWheelEngine('overlay');

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const m = params.get('mode') === 'overlay' ? 'overlay' : 'dashboard';
                setMode(m);
                if(m === 'overlay') document.body.classList.add('overlay-mode');
                else document.body.classList.add('dashboard-mode');
            }, []);

            if (!mode) return null;

            if (mode === 'overlay') return <Overlay data={ovEngine.data} update={ovEngine.update} />;
            return <Dashboard data={dashEngine.data} update={dashEngine.update} status={dashEngine.status} />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
